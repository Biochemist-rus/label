name: Package Ready-to-Use ZIP

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: 'Optional release version without leading v, for example: 3.6. Leave empty to auto-detect latest.'
        required: false
        default: ''

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  package:
    name: Check, build and package ready-to-use ZIP
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: python -m pip install --upgrade pip pyinstaller pillow openpyxl

      - name: Resolve release files
        id: release
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          $version = '${{ github.event.inputs.release_version }}'

          if ([string]::IsNullOrWhiteSpace($version)) {
            $version = Get-ChildItem -Name 'print_datamatrix_zpl_graphics_from_excel_v*.py' |
              ForEach-Object {
                if ($_ -match '^print_datamatrix_zpl_graphics_from_excel_v(?<v>\d+\.\d+)\.py$') {
                  [PSCustomObject]@{ Version = [version]$Matches.v; Text = $Matches.v }
                }
              } |
              Sort-Object Version -Descending |
              Select-Object -First 1 -ExpandProperty Text
          }

          if ([string]::IsNullOrWhiteSpace($version)) {
            throw 'Unable to resolve release version'
          }

          $py = "print_datamatrix_zpl_graphics_from_excel_v$version.py"
          $bat = "menu_print_v$version.bat"
          $ini = "menu_print_v$version.ini"
          $exe = "print_datamatrix_zpl_graphics_from_excel_v$version"
          $exePath = "dist/$exe.exe"
          $root = "label-tool-v$version"
          $zip = "label-tool-v$version-ready-to-use.zip"

          foreach ($file in @($py, $bat, $ini, 'data.xlsx', 'eac.png')) {
            if (!(Test-Path $file)) {
              throw "Required file not found: $file"
            }
          }

          if (!(Test-Path 'fonts')) {
            throw 'Required folder not found: fonts'
          }

          "version=$version" >> $env:GITHUB_OUTPUT
          "py=$py" >> $env:GITHUB_OUTPUT
          "bat=$bat" >> $env:GITHUB_OUTPUT
          "ini=$ini" >> $env:GITHUB_OUTPUT
          "exe=$exe" >> $env:GITHUB_OUTPUT
          "exe_path=$exePath" >> $env:GITHUB_OUTPUT
          "root=$root" >> $env:GITHUB_OUTPUT
          "zip=$zip" >> $env:GITHUB_OUTPUT
          "artifact_name=label-tool-v$version-ready-to-use" >> $env:GITHUB_OUTPUT

          Write-Host "Release version: $version"
          Write-Host "Python source: $py"
          Write-Host "BAT: $bat"
          Write-Host "INI: $ini"
          Write-Host "ZIP: $zip"

      - name: Check Python syntax
        run: python -m py_compile "${{ steps.release.outputs.py }}"

      - name: Check CLI help
        run: python "${{ steps.release.outputs.py }}" --help

      - name: Build Windows EXE
        run: python -m PyInstaller --noconfirm --clean --onefile --name "${{ steps.release.outputs.exe }}" --add-data "eac.png;." --add-data "fonts;fonts" "${{ steps.release.outputs.py }}"

      - name: Prepare ready-to-use folder
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'

          $root = '${{ steps.release.outputs.root }}'
          $zip = '${{ steps.release.outputs.zip }}'
          $bat = '${{ steps.release.outputs.bat }}'
          $ini = '${{ steps.release.outputs.ini }}'
          $exePath = '${{ steps.release.outputs.exe_path }}'

          if (Test-Path $root) { Remove-Item $root -Recurse -Force }
          if (Test-Path $zip) { Remove-Item $zip -Force }

          New-Item -ItemType Directory -Force -Path $root | Out-Null
          New-Item -ItemType Directory -Force -Path "$root\dist" | Out-Null
          New-Item -ItemType Directory -Force -Path "$root\fonts" | Out-Null

          Copy-Item $bat "$root\"
          Copy-Item $ini "$root\"
          Copy-Item 'data.xlsx' "$root\"
          Copy-Item 'eac.png' "$root\"
          Copy-Item 'fonts\*' "$root\fonts\" -Recurse
          Copy-Item $exePath "$root\dist\"

          Compress-Archive -Path $root -DestinationPath $zip -Force

      - name: Upload ready-to-use ZIP
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.release.outputs.artifact_name }}
          path: ${{ steps.release.outputs.zip }}
          if-no-files-found: error