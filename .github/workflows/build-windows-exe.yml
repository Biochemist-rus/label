name: Build Windows EXE

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  check-and-build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: python -m pip install --upgrade pip pyinstaller pillow openpyxl

      - name: Check Python syntax
        run: python -m py_compile print_datamatrix_zpl_graphics_from_excel_v3.5.py

      - name: Check CLI help
        run: python print_datamatrix_zpl_graphics_from_excel_v3.5.py --help

      - name: Build Windows EXE
        run: python -m PyInstaller --noconfirm --clean --onefile --name print_datamatrix_zpl_graphics_from_excel_v3.5 --add-data "eac.png;." --add-data "fonts;fonts" print_datamatrix_zpl_graphics_from_excel_v3.5.py

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: print_datamatrix_zpl_graphics_from_excel_v3.5-windows-exe
          path: dist/print_datamatrix_zpl_graphics_from_excel_v3.5.exe
          if-no-files-found: error
