name: Build Windows EXE

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      release_version:
        description: 'Optional release version without leading v, for example: 3.6. Leave empty to auto-detect latest.'
        required: false
        default: ''

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check-and-build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: python -m pip install --upgrade pip pyinstaller pillow openpyxl

      - name: Resolve release files
        id: release
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          $version = '${{ github.event.inputs.release_version }}'

          if ([string]::IsNullOrWhiteSpace($version)) {
            $version = Get-ChildItem -Name 'print_datamatrix_zpl_graphics_from_excel_v*.py' |
              ForEach-Object {
                if ($_ -match '^print_datamatrix_zpl_graphics_from_excel_v(?<v>\d+\.\d+)\.py$') {
                  [PSCustomObject]@{ Version = [version]$Matches.v; Text = $Matches.v }
                }
              } |
              Sort-Object Version -Descending |
              Select-Object -First 1 -ExpandProperty Text
          }

          if ([string]::IsNullOrWhiteSpace($version)) {
            throw 'Unable to resolve release version'
          }

          $py = "print_datamatrix_zpl_graphics_from_excel_v$version.py"
          $exe = "print_datamatrix_zpl_graphics_from_excel_v$version"
          $exePath = "dist/$exe.exe"

          if (!(Test-Path $py)) {
            throw "Python source not found: $py"
          }

          "version=$version" >> $env:GITHUB_OUTPUT
          "py=$py" >> $env:GITHUB_OUTPUT
          "exe=$exe" >> $env:GITHUB_OUTPUT
          "exe_path=$exePath" >> $env:GITHUB_OUTPUT
          "artifact_name=$exe-windows-exe" >> $env:GITHUB_OUTPUT

          Write-Host "Release version: $version"
          Write-Host "Python source: $py"
          Write-Host "EXE name: $exe"

      - name: Check Python syntax
        run: python -m py_compile "${{ steps.release.outputs.py }}"

      - name: Check CLI help
        run: python "${{ steps.release.outputs.py }}" --help

      - name: Build Windows EXE
        run: python -m PyInstaller --noconfirm --clean --onefile --name "${{ steps.release.outputs.exe }}" --add-data "eac.png;." --add-data "fonts;fonts" "${{ steps.release.outputs.py }}"

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.release.outputs.artifact_name }}
          path: ${{ steps.release.outputs.exe_path }}
          if-no-files-found: error