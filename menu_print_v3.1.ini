; LABEL PRINTING TOOL v3.1 CONFIGURATION / КОНФИГУРАЦИЯ ПЕЧАТИ ЭТИКЕТОК v3.1
; Paths are relative to the folder containing the BAT file / Пути относительны папке, где лежит BAT-файл
; Lines starting with ; are comments / Строки, начинающиеся с ;, являются комментариями

[Settings]
Language=EN
ExcelFile=data.xlsx
BarcodeColumn=barcode
GtinColumn=gtin
NameColumn=name
Printer1IP=192.168.14.105
Printer2IP=172.16.102.80
CurrentIP=192.168.14.105
LastRow=0

; Printer 1 profile / Профиль принтера 1
; Label size: 60x30 mm / Размер наклейки: 60х30 мм
[Printer1_60x30]
Printer1Label=60x30
Printer1X=15
Printer1Y=20
Printer1ModuleSize=3
Printer1TextOffsetY=110
Printer1TextWidthPx=450
Printer1GtinFontSize=22
Printer1NameFontSize=24
Printer1Ai21FontSize=20
Printer1LineGap=4
Printer1NameMaxLines=2
Printer1FontPath=fonts\arial.ttf
Printer1EacLogoPath=eac.png
Printer1EacHeightPx=64
Printer1EacGapPx=16
Printer1EacOffsetX=-1
Printer1EacOffsetY=0

; Printer 2 profile / Профиль принтера 2
; Label size: 60x40 mm / Размер наклейки: 60х40 мм
[Printer2_60x40]
Printer2Label=60x40
Printer2X=80
Printer2Y=40
Printer2ModuleSize=4
Printer2TextOffsetY=150
Printer2TextWidthPx=450
Printer2GtinFontSize=22
Printer2NameFontSize=26
Printer2Ai21FontSize=22
Printer2LineGap=5
Printer2NameMaxLines=2
Printer2FontPath=fonts\arial.ttf
Printer2EacLogoPath=eac.png
Printer2EacHeightPx=64
Printer2EacGapPx=16
Printer2EacOffsetX=130
Printer2EacOffsetY=0

